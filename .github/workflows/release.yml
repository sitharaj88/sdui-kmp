name: Release

# Triggered by pushing a tag that matches a SemVer-style release marker (e.g. v1.0.0,
# v1.2.3-rc1). The workflow rewrites `gradle.properties` to set `sduiVersion` from the
# tag, then drives the gradle-nexus-publish-plugin's end-to-end staging-and-release flow:
# `publishToSonatype` uploads to a fresh staging repo, `closeAndReleaseSonatypeStagingRepository`
# closes it (running Sonatype's validation rules) and promotes it to Maven Central.
#
# Required GitHub repo secrets (configure under Settings -> Secrets and variables -> Actions):
#   MAVEN_CENTRAL_USERNAME  Sonatype Central user token name
#   MAVEN_CENTRAL_PASSWORD  Sonatype Central user token secret
#   GPG_PRIVATE_KEY         ASCII-armored PGP secret key (single-line, with literal \n
#                           sequences for line breaks if pasted via the GitHub UI; or multiline
#                           via `gh secret set --body-file`)
#   GPG_PASSPHRASE          The passphrase for the PGP secret key
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release:
    name: Publish to Sonatype Central
    # macos-14 (Apple Silicon) ships with full Xcode, which Kotlin/Native iOS targets need to
    # link iosArm64 / iosX64 / iosSimulatorArm64 publications. ubuntu-latest cannot publish
    # those KMP variants.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set release version from tag
        # GITHUB_REF_NAME for a tag push is the bare tag (e.g. "v1.0.0"); strip the leading "v"
        # and rewrite gradle.properties in place so the convention plugin reads the right
        # `sduiVersion`. Using sed -i.bak keeps the script portable across GNU and BSD sed.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version $VERSION"
          sed -i.bak "s/^sduiVersion=.*/sduiVersion=${VERSION}/" gradle.properties
          rm -f gradle.properties.bak
          grep '^sduiVersion=' gradle.properties

      - name: Verify release POM metadata
        # Fail fast before touching the network — verifyRelease materialises every module's
        # POM via publishAllToMavenLocal and checks the Sonatype-required fields are present.
        run: ./gradlew verifyRelease --no-daemon --stacktrace

      - name: Safety gates (protocol snapshot, dependency rules, tests)
        # Guard the irreversible publish below: the checkout above is pinned to the tagged
        # SHA, so these gates run against exactly the code being released. A protocol break
        # (verifyProtocolSnapshot), an illegal module dependency (verifyDependencyRules), or
        # a red test (the JVM suite via jvmTest + test — including :tooling-cli:test, which
        # exercises the schema linter) aborts the workflow *before*
        # `closeAndReleaseSonatypeStagingRepository` can promote a bad build to Maven Central.
        # We run the JVM test set rather than the full multiplatform `check` to keep the gate
        # fast; iOS/Wasm build breaks are already caught by the CI matrix on the tagged SHA.
        run: ./gradlew verifyProtocolSnapshot verifyDependencyRules jvmTest test --no-daemon --stacktrace

      - name: Publish to Sonatype Central (close + release)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        # `publishToSonatype` uploads every shipping module to a fresh staging repo;
        # `closeAndReleaseSonatypeStagingRepository` then runs Sonatype's validation rules,
        # closes the repo, and (on success) promotes it to Maven Central. Both tasks come
        # from the gradle-nexus-publish-plugin applied at the root project.
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon --stacktrace

      - name: Upload publish logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: |
            **/build/reports/**
            **/build/publications/**
          if-no-files-found: ignore
          retention-days: 14
