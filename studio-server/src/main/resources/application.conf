# Ktor HOCON configuration for the Studio backend.
#
# Every value here is overridable via environment variables — the substitution syntax is
# `${?VAR}` so the override is optional. Defaults stay developer-friendly: no DB credentials
# required to boot, and the studio runs on port 8081 alongside the sample-server (8080).
ktor {
    deployment {
        port = 8081
        port = ${?PORT}
        host = "0.0.0.0"
        host = ${?HOST}
    }
    application {
        modules = [ dev.sdui.kmp.studio.server.StudioModuleKt.studioModule ]
    }
}

# Persistence — read by dev.sdui.kmp.studio.server.db.StudioDatabase. JDBC_URL falls back to an
# in-memory H2 database when unset; use Postgres in production.
persistence {
    jdbc {
        url = ""
        url = ${?JDBC_URL}
        user = "sdui_studio"
        user = ${?JDBC_USER}
        password = ""
        password = ${?JDBC_PASSWORD}
    }
}

# JWT signing secret. STUDIO_JWT_SECRET must be set in production; the fallback is a
# hard-coded sample-only value documented in StudioJwt.FALLBACK_SECRET.
jwt {
    secret = ""
    secret = ${?STUDIO_JWT_SECRET}
    issuer = "sdui-kmp-studio"
    audience = "sdui-kmp-studio-clients"
}
